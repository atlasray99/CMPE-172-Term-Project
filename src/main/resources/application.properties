spring.application.name=advising-scheduler
server.port=8080

# SQLite file-based database (persists across restarts)
spring.datasource.url=jdbc:sqlite:advisingdb.db
spring.datasource.driver-class-name=org.sqlite.JDBC
# Enable foreign key enforcement on every connection
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys = ON

# Initialize schema and seed data on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# Thymeleaf
spring.thymeleaf.cache=false

# ── Logging ──────────────────────────────────────────────────────────────────
logging.file.name=logs/advising-scheduler.log
logging.level.com.advisingscheduler=DEBUG
logging.level.org.springframework=INFO
logging.level.org.springframework.jdbc.core=DEBUG

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Advising Scheduler
info.app.description=Entrepreneurial One-on-One Advising Appointment System
info.app.version=1.0.0
info.app.milestone=Final Project

# Notification service URL (used by NotificationClient)
notification.service.url=http://localhost:8080/api/external/notifications
